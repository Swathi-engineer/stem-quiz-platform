<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Fredoka+One&display=swap');

    :root {
      --c1: #FF6B6B; --c2: #FFE66D; --c3: #4ECDC4; --c4: #A855F7;
      --c5: #FF9F43; --dark: #1a1a2e; --card: #16213e; --glow: #4ECDC4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(45deg, #0f0f1a, #1a0033, #0b0726, #210d33);
      background-size: 400% 400%;
      animation: bgPulse 15s ease infinite; 
      min-height: 100vh;
      overflow-x: hidden;
      color: white;
      transition: background 0.5s ease;
    }
    @keyframes bgPulse {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Stars background */
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 20% 50%, #16213e 0%, #0f3460 50%, #1a1a2e 100%);
      overflow: hidden;
    }
    .star {
      position: absolute; border-radius: 50%;
      background: white; animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle { 0%{opacity:0.2;transform:scale(1)} 100%{opacity:1;transform:scale(1.4)} }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes popIn { 0%{transform:scale(0) rotate(-10deg);opacity:0} 80%{transform:scale(1.1) rotate(2deg)} 100%{transform:scale(1) rotate(0deg);opacity:1} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes glow { 0%,100%{box-shadow:0 0 20px var(--c3)} 50%{box-shadow:0 0 50px var(--c3),0 0 80px var(--c3)} }
    @keyframes xpFly { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-60px);opacity:0} }
    @keyframes slideIn { from{transform:translateX(120%) rotate(5deg);opacity:0} to{transform:translateX(0) rotate(0);opacity:1} }
    
    .app { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 16px; }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 20px; margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    .logo { font-family:'Outfit',sans-serif; font-size:1.7rem; color:#58cc02; font-weight:900;
      text-shadow:0 0 20px rgba(88,204,2,0.4); letter-spacing:1px; }
    .title-header { font-weight: bold; font-size: 1.2rem; color: #fff; text-align: center; }
    .stats { display:flex; gap:14px; }
    .stat-pill {
      display:flex; align-items:center; gap:6px;
      background:rgba(255,255,255,0.08); border-radius:30px;
      padding:6px 14px; font-weight:800; font-size:.9rem;
    }
    .xp-pill { color:var(--c2); border:1.5px solid var(--c2)40; }
    .level-pill { color:var(--c4); border:1.5px solid var(--c4)40; }

    /* QUIZ AREA */
    .quiz-screen { animation: popIn .4s ease forwards; width: 100%; max-width: 700px; margin: 0 auto; }
    .progress-bar-wrap { margin-bottom:18px; }
    .progress-labels { display:flex; justify-content:space-between; margin-bottom:6px; font-size:.82rem; color:rgba(255,255,255,.6); }
    .progress-track { height:10px; background:rgba(255,255,255,.1); border-radius:10px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:10px; transition:width .6s cubic-bezier(.4,0,.2,1); background:linear-gradient(90deg,var(--c3),var(--c4)); }

    .question-card {
      border-radius:28px; padding:28px; margin-bottom:18px;
      background:rgba(255,255,255,.05);
      border:2px solid rgba(255,255,255,.1);
      backdrop-filter:blur(10px); position:relative; overflow:hidden;
    }
    .q-visual {
      width:100%; max-height: 250px; border-radius:18px; margin-bottom:18px;
      display:flex; align-items:center; justify-content:center; overflow:hidden;
      position:relative;
    }
    .visual-img {
       max-width: 100%; max-height: 250px; border-radius: 15px; border: 4px dashed #ff7675; object-fit: contain;
    }
    .q-category {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(255,255,255,.1); border-radius:20px; padding:5px 14px;
      font-size:.8rem; font-weight:700; margin-bottom:12px;
    }
    .q-text { font-size:1.35rem; font-weight:800; line-height:1.5; margin-bottom:20px; }
    .timer-ring {
      position:absolute; top:20px; right:20px; width:52px; height:52px;
    }
    .timer-ring svg { transform:rotate(-90deg); }
    .timer-ring circle { fill:none; stroke:rgba(255,255,255,.1); stroke-width:4; }
    .timer-ring .progress-circle { stroke:var(--c1); stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
    .timer-num { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-weight:800; font-size:.95rem; }

    .options { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .option-btn {
      border-radius:16px; padding:16px 14px; cursor:pointer;
      background:rgba(255,255,255,.07); border:2px solid rgba(255,255,255,.15);
      color:white; font-family:'Outfit',sans-serif; font-size:1.05rem; font-weight:700;
      transition:all .25s; text-align:left; position:relative; overflow:hidden;
      display:flex; align-items:center; gap:10px;
    }
    .option-btn:hover:not(:disabled) { background:rgba(255,255,255,.15); transform:scale(1.02); border-color:rgba(255,255,255,.4); }
    .option-btn.correct { background:linear-gradient(135deg,#4ECDC422,#22c55e33)!important; border-color:#4ECDC4!important; animation:bounce .4s ease; }
    .option-btn.wrong { background:linear-gradient(135deg,#FF6B6B22,#ef444433)!important; border-color:#FF6B6B!important; animation:shake .3s ease; }
    .opt-letter {
      width:35px; height:35px; border-radius:8px; display:flex; align-items:center;
      justify-content:center; font-weight:900; font-size:1rem; flex-shrink:0;
      background:rgba(255,255,255,.12);
    }
    .correct .opt-letter { background:#4ECDC4; color:var(--dark); }
    .wrong .opt-letter { background:#FF6B6B; color:white; }

    /* FEEDBACK OVERLAY */
    .feedback-overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:100; pointer-events:none; opacity:0; transition:opacity .3s;
    }
    .feedback-overlay.show { opacity:1; }
    .feedback-bubble {
      font-family:'Fredoka One',cursive; font-size:4rem; color:var(--c2);
      text-shadow:0 0 30px var(--c2); animation:popIn .3s ease, bounce 1s .3s ease infinite;
      text-align:center;
    }
    .feedback-sub { color:rgba(255,255,255,.9); font-weight: bold; font-size:1.5rem; margin-top:8px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 10px;}

    .xp-float {
      position:fixed; top:40%; left:50%; transform:translateX(-50%);
      font-family:'Fredoka One',cursive; font-size:2rem; color:var(--c2);
      pointer-events:none; animation:xpFly 1.2s ease forwards;
      text-shadow:0 0 20px var(--c2); z-index:200;
    }

    /* RESULT SCREEN */
    .result-screen { text-align:center; padding:20px; animation:popIn .5s ease; width: 100%; max-width: 700px; margin: 0 auto; }
    .result-mascot { font-size:5rem; animation:bounce 1s infinite; display:block; margin-bottom:16px; }
    .result-title { font-family:'Fredoka One',cursive; font-size:2.5rem; margin-bottom:8px; }
    .score-circle {
      width:140px; height:140px; border-radius:50%; margin:20px auto;
      background:conic-gradient(var(--c3) var(--score-deg,0deg), rgba(255,255,255,.1) 0);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 40px var(--c3)55; position:relative;
    }
    .score-inner { background:var(--dark); width:110px; height:110px; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .score-num { font-family:'Fredoka One',cursive; font-size:2.2rem; color:var(--c3); }
    .score-label { font-size:.75rem; color:rgba(255,255,255,.5); }
    .result-stats { display:flex; justify-content:center; gap:20px; margin:20px 0; }
    .r-stat { background:rgba(255,255,255,.07); border-radius:16px; padding:14px 22px; }
    .r-stat-val { font-family:'Fredoka One',cursive; font-size:1.6rem; }
    .r-stat-label { font-size:.75rem; color:rgba(255,255,255,.5); margin-top:2px; }
    .play-again {
      background:linear-gradient(135deg,var(--c3),var(--c4)); border:none; color:white;
      font-family:'Fredoka One',cursive; font-size:1.3rem; padding:16px 40px;
      border-radius:50px; cursor:pointer; margin-top:10px; transition:all .3s;
      box-shadow:0 8px 30px var(--c3)55; animation:glow 2s infinite;
    }
    .play-again:hover { transform:scale(1.05) translateY(-3px); }

    .loading { text-align: center; font-size: 1.5em; color: var(--c3); margin-top: 50px; font-family: 'Fredoka One', cursive;}

    /* Back buttons */
    .back-btn {
      background:rgba(255,255,255,.08); border:1.5px solid rgba(255,255,255,.15);
      color:white; border-radius:12px; padding:8px 18px; cursor:pointer;
      font-family:'Outfit',sans-serif; font-weight:700; margin-bottom:20px;
      transition:all .2s;
    }
    .back-btn:hover { background:rgba(255,255,255,.15); }
    
    @media(max-width:560px) {
      .options { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>



<div class="app">
  <div class="header">
    <div class="logo">🦉 STEMingo</div>
    <div class="title-header" id="header-title">Loading...</div>
    <div class="stats">
      <div class="stat-pill xp-pill">⚡ <span id="xpCount">0</span> XP</div>
      <div class="stat-pill level-pill">⭐ Lv<span id="headerLevel">1</span></div>
    </div>
  </div>

  <div id="mainContent">
    <div class="loading">Fetching questions...</div>
  </div>
</div>

<div class="feedback-overlay" id="feedbackOverlay">
  <div class="feedback-bubble" id="feedbackText"></div>
  <div class="feedback-sub" id="feedbackSub"></div>
</div>

<script>
// ── PARAMS ──────────────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const grade = parseInt(params.get("grade") || 1);
const subject = params.get("subject") || "Science";
const email = params.get("email") || "";
const lesson = params.get("lesson") || "General";
const level = parseInt(params.get("level") || 1);

document.getElementById("header-title").innerText = `${subject} - ${lesson} (Level ${level})`;
document.getElementById("headerLevel").innerText = level;

// THEME ADJUSTMENTS based on grade 
if (grade >= 1 && grade <= 3) {
  document.body.style.fontFamily = "'Comic Sans MS', 'Kristen ITC', 'Baloo', cursive";
  document.body.style.background = "linear-gradient(45deg, #2b1055, #1d0740, #0a041f, #230847)";
  document.body.style.backgroundSize = "400% 400%";
  document.documentElement.style.setProperty('--c3', '#ff61d8');
  document.documentElement.style.setProperty('--c1', '#00e5ff');
} else if (grade >= 4 && grade <= 7) {
  document.body.style.background = "linear-gradient(45deg, #0f0f1a, #1a0033, #0b0726, #210d33)";
} else {
  document.body.style.background = "#050505";
}

// ── AUDIO ───────────────────────────────────────────────────────────────────
const correctSound = new Audio('https://www.myinstants.com/media/sounds/correct-ding.mp3');
const wrongSound = new Audio('https://www.myinstants.com/media/sounds/wrong-buzzer.mp3');

// ── STATE ───────────────────────────────────────────────────────────────────
let state = { qs:[], qi:0, correct:0, xp:0, timeLeft:20 };
let timerInterval;

const CORRECT_MSGS = ["🌟 Brilliant!","⚡ Super!","🎯 Spot On!","🚀 Amazing!","✨ Genius!","🔥 On Fire!","💥 Awesome!"];
const WRONG_MSGS = ["😅 Not quite!","🤔 Keep trying!","💡 Almost!","🌱 You'll get it!"];



function render(html) { document.getElementById('mainContent').innerHTML = html; }

async function loadQuestions() {
  try {
    const res = await fetch(`/api/questions/${grade}/${subject}`);
    let allQuestions = await res.json();
    
    // Mock visual questions for young students
    if (grade >= 1 && grade <= 3 && subject === 'Science' && lesson === 'Plants') {
        allQuestions = [
          { question: "How many leaves do you see?", options: ["2", "3", "4", "5"], answer: "3", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Three_leaves_icon.svg/200px-Three_leaves_icon.svg.png" },
          { question: "Which part of the plant is this?", options: ["Root", "Stem", "Leaf", "Flower"], answer: "Flower", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Flower_poster_2.jpg/200px-Flower_poster_2.jpg" },
          { question: "What does this plant need to grow?", options: ["Water", "Soda", "Candy", "Rocks"], answer: "Water", image: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Water_drop_on_a_leaf.jpg/200px-Water_drop_on_a_leaf.jpg" }
        ];
    }

    // Partition questions by level (2 per level)
    const itemsPerLevel = 2;
    const startIndex = (level - 1) * itemsPerLevel;
    let sliced = allQuestions.slice(startIndex, startIndex + itemsPerLevel);
    
    // Fallback if not enough questions
    if (sliced.length === 0 && allQuestions.length > 0) {
        sliced = allQuestions.slice(0, 2); 
    }

    state.qs = sliced;
    
    if (state.qs.length === 0) {
      render("<p class='loading'>No questions available for this grade and subject yet.</p><br><button class='back-btn' onclick='goBack()'>Go Back</button>");
      return;
    }

    showQuestion();
  } catch (err) {
    console.error(err);
    render("<p class='loading' style='color:#FF6B6B'>Failed to load questions.</p>");
  }
}

function getScene(subject, qText) {
  const text = (qText || "").toLowerCase();
  
  let type = 'default';
  if (text.includes('planet') || text.includes('mars') || text.includes('space') || text.includes('earth')) type = 'planet';
  else if (text.includes('plant') || text.includes('leaf') || text.includes('grow')) type = 'plant';
  else if (text.includes('spider') || text.includes('insect') || text.includes('animal')) type = 'spider';
  else if (text.includes('x') || text.includes('+') || text.includes('math') || text.includes('calculate')) type = 'math_stars';
  else if (text.includes('triangle') || text.includes('angle') || text.includes('side')) type = 'triangle_scene';
  else if (text.includes('cell') || text.includes('nucleus') || text.includes('mitochondria')) type = 'cell_scene';
  else if (text.includes('atom') || text.includes('electron') || text.includes('proton')) type = 'atom_scene';
  else if (text.includes('dna') || text.includes('gene')) type = 'dna_scene';
  else if (text.includes('data') || text.includes('computer') || text.includes('cpu')) type = 'cpu_scene';
  else if (subject.toLowerCase().includes('math')) type = ['math_stars', 'algebra_scene', 'pi_scene'][Math.floor(Math.random()*3)];
  else if (subject.toLowerCase().includes('sci')) type = ['planet', 'cell_scene', 'atom_scene', 'dna_scene'][Math.floor(Math.random()*4)];
  else if (subject.toLowerCase().includes('tech') || subject.toLowerCase().includes('comp')) type = ['cpu_scene', 'algo_scene', 'math_stars'][Math.floor(Math.random()*3)];
  else type = 'planet';

  const scenes = {

      <circle cx="310" cy="55" r="5" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="60" cy="120" r="3" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="340" cy="150" r="4" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/></circle>
    </svg>`,
    plant: `<svg viewBox="0 0 400 180" class="scene-svg" style="background:linear-gradient(180deg,#001a00,#003300); width:100%; height:100%; border-radius:18px;">
      <circle cx="200" cy="60" r="55" fill="#FFD700" opacity="0.15"/>

      <text x="60" y="100" font-size="48" fill="#fff" opacity="0.9" font-family="'Fredoka One', cursive">7</text>

    cell_scene: `<svg viewBox="0 0 400 180" class="scene-svg" style="background:linear-gradient(135deg,#001a1a,#002233); width:100%; height:100%; border-radius:18px;">

    cpu_scene: `<svg viewBox="0 0 400 180" class="scene-svg" style="background:linear-gradient(135deg,#0a0a1e,#1a1a2e); width:100%; height:100%; border-radius:18px;">

    </svg>`,
    atom_scene: `<svg viewBox="0 0 400 180" class="scene-svg" style="background:linear-gradient(135deg,#0a001a,#1a0033); width:100%; height:100%; border-radius:18px;">

      <ellipse cx="200" cy="90" rx="80" ry="30" fill="none" stroke="#FF6B6B" stroke-width="1.5" opacity="0.7" transform="rotate(120 200 90)"/>
      <circle cx="280" cy="90" r="7" fill="#4ECDC4"><animateTransform attributeName="transform" type="rotate" from="0 200 90" to="360 200 90" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="160" cy="160" r="7" fill="#A855F7"><animateTransform attributeName="transform" type="rotate" from="120 200 90" to="480 200 90" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="160" cy="20" r="7" fill="#FF6B6B"><animateTransform attributeName="transform" type="rotate" from="240 200 90" to="600 200 90" dur="4s" repeatCount="indefinite"/></circle>
    </svg>`,
    pi_scene: `<svg viewBox="0 0 400 180" class="scene-svg" style="background:linear-gradient(135deg,#1a0a00,#2e1a00); width:100%; height:100%; border-radius:18px;">
      <circle cx="200" cy="90" r="65" fill="none" stroke="#FF9F43" stroke-width="2" stroke-dasharray="6"/>
      <line x1="135" y1="90" x2="265" y2="90" stroke="#FFE66D" stroke-width="2.5"><animateTransform attributeName="transform" type="rotate" from="0 200 90" to="360 200 90" dur="10s" repeatCount="indefinite"/></line>
      <text x="200" y="87" text-anchor="middle" fill="#FFE66D" font-size="10">diameter</text>

    </svg>`,
    algebra_scene: `<svg viewBox="0 0 400 180" class="scene-svg" style="background:linear-gradient(135deg,#0a1a3e,#0a2e3e); width:100%; height:100%; border-radius:18px;">
      <rect x="100" y="60" width="60" height="60" rx="10" fill="#4ECDC422" stroke="#4ECDC4" stroke-width="2"/>
      <text x="130" y="98" fill="#4ECDC4" font-size="30" text-anchor="middle" font-weight="900">X</text>
      <text x="180" y="98" fill="#fff" font-size="30" font-weight="900">+</text>
      <rect x="210" y="60" width="60" height="60" rx="10" fill="#FFE66D22" stroke="#FFE66D" stroke-width="2"/>
      <text x="240" y="98" fill="#FFE66D" font-size="30" text-anchor="middle" font-weight="900">Y</text>
      <text x="290" y="98" fill="#fff" font-size="30" font-weight="900">=</text>
      <text x="330" y="98" fill="#FF6B6B" font-size="30" font-weight="900">?</text>

    dna_scene: `<svg viewBox="0 0 400 180" class="scene-svg" style="background:linear-gradient(135deg,#001a00,#001a1a); width:100%; height:100%; border-radius:18px;">
      <ellipse cx="200" cy="90" rx="35" ry="6" fill="none" stroke="#4ECDC4" stroke-width="2" opacity="0.8"><animateTransform attributeName="transform" type="rotate" from="0 200 90" to="360 200 90" dur="3s" repeatCount="indefinite"/></ellipse>
      <ellipse cx="200" cy="90" rx="35" ry="6" fill="none" stroke="#FF6B6B" stroke-width="2" opacity="0.8"><animateTransform attributeName="transform" type="rotate" from="0 200 90" to="-360 200 90" dur="3s" repeatCount="indefinite"/></ellipse>
      <text x="200" y="175" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11">🧬 DNA</text>
    </svg>`
  };

  return scenes[type] || scenes.math_stars;
}

function showQuestion() {
  if (state.qi >= state.qs.length) { showResult(); return; }
  
  const q = state.qs[state.qi];
  const prog = Math.round((state.qi / state.qs.length) * 100);
  const letters = ['A','B','C','D'];
  
  // Optional Visual
  let visualHtml = "";
  if (q.image) {
    visualHtml = `<div class="q-visual"><img src="${q.image}" class="visual-img"></div>`;
  } else {
    visualHtml = `<div class="q-visual">${getScene(subject, q.question)}</div>`;
  }
  
  // Safe JS escape for HTML injection
  const escapeSingleQuotes = (str) => String(str).replace(/'/g, "\\'");
  
  render(`
  <div class="quiz-screen">
    <button class="back-btn" onclick="goBack()">← Give Up</button>
    <div class="progress-bar-wrap">
      <div class="progress-labels"><span>Question ${state.qi+1} / ${state.qs.length}</span><span>${prog}% done</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
    </div>
    <div class="question-card">
      <div class="timer-ring">
        <svg width="52" height="52">
          <circle cx="26" cy="26" r="22"/>
          <circle class="progress-circle" cx="26" cy="26" r="22" stroke-dasharray="${2*Math.PI*22}" stroke-dashoffset="0" id="timerCircle"/>
        </svg>
        <div class="timer-num" id="timerNum">20</div>
      </div>

      ${visualHtml}
      
      <div class="q-category">🔬 ${subject}</div>
      <div class="q-text">${q.question}</div>
      <div class="options">
        ${q.options.map((o, i) => `
        <button class="option-btn" id="opt${i}" onclick="answer('${escapeSingleQuotes(o)}', ${i})">
          <div class="opt-letter">${letters[i]}</div>${o}
        </button>`).join('')}
      </div>
    </div>
  </div>`);

  startTimer();
}

function clearTimer() { clearInterval(timerInterval); }

function startTimer() {
  state.timeLeft = 20;
  const circ = document.getElementById('timerCircle');
  const numEl = document.getElementById('timerNum');
  const total = 2 * Math.PI * 22;
  clearTimer();
  
  timerInterval = setInterval(() => {
    state.timeLeft--;
    if (numEl) numEl.textContent = state.timeLeft;
    if (circ) circ.style.strokeDashoffset = total * (1 - state.timeLeft / 20);
    if (state.timeLeft <= 5 && numEl) numEl.style.color = '#FF6B6B';
    if (state.timeLeft <= 0) { clearTimer(); timeUp(); }
  }, 1000);
}

function timeUp() {
  disableOptions();
  showFeedback(false, "⏱️ Time's Up!", "Focus on the next one!");
  wrongSound.cloneNode(true).play().catch(e => console.log(e));
  
  setTimeout(() => { hideFeedback(); state.qi++; showQuestion(); }, 2000);
}

function answer(selectedOptText, btnIdx) {
  clearTimer();
  const q = state.qs[state.qi];
  const isCorrect = (selectedOptText === String(q.answer));
  
  disableOptions();
  const btns = document.querySelectorAll('.option-btn');
  btns[btnIdx].classList.add(isCorrect ? 'correct' : 'wrong');
  
  // Highlight correct answer if wrong
  if (!isCorrect) {
    q.options.forEach((opt, i) => {
      if (String(opt) === String(q.answer)) btns[i].classList.add('correct');
    });
  }
  
  if (isCorrect) {
    state.correct++;
    let earnedXP = 50 + (state.timeLeft * 2); // Bonus XP for speed
    state.xp += earnedXP;
    document.getElementById('xpCount').textContent = state.xp;
    
    showXPFloat(`+${earnedXP} XP`);
    showFeedback(true, CORRECT_MSGS[Math.floor(Math.random() * CORRECT_MSGS.length)], "Perfect!");
    correctSound.cloneNode(true).play().catch(e => console.log(e));
  } else {
    showFeedback(false, WRONG_MSGS[Math.floor(Math.random() * WRONG_MSGS.length)], `Correct Answer: ${q.answer}`);
    wrongSound.cloneNode(true).play().catch(e => console.log(e));
  }
  
  setTimeout(() => { hideFeedback(); state.qi++; showQuestion(); }, 2400);
}

function disableOptions() {
  document.querySelectorAll('.option-btn').forEach(b => { 
    b.disabled = true; 
    b.style.cursor = 'default'; 
  });
}

function showFeedback(ok, msg, sub) {
  const o = document.getElementById('feedbackOverlay');
  document.getElementById('feedbackText').textContent = msg;
  document.getElementById('feedbackSub').textContent = sub || '';
  document.getElementById('feedbackText').style.color = ok ? '#FFE66D' : '#FF6B6B';
  o.classList.add('show');
}
function hideFeedback(){ document.getElementById('feedbackOverlay').classList.remove('show'); }

function showXPFloat(txt) {
  const el = document.createElement('div'); 
  el.className = 'xp-float'; 
  el.textContent = txt;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

async function showResult() {
  clearTimer();
  const pct = Math.round((state.correct / state.qs.length) * 100);
  const deg = pct * 3.6;
  const mascot = pct >= 100 ? '🏆' : pct >= 50 ? '😊' : '😅';
  const title = pct >= 100 ? 'Amazing Work! 🌟' : pct >= 50 ? 'Good Job! 👍' : 'Keep Practicing! 💪';
  
  let unlockMsg = "";
  if (pct === 100) {
    confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 }, zIndex: 1000 });
    unlockMsg = "<div style='color:#4ECDC4; font-weight:bold; margin-top:10px; font-size: 1.2rem;'>🔓 Next Level Unlocked!</div>";
    
    // Unlock local
    const key = `prog_${email}_${grade}_${subject}_${lesson}`;
    const currentUnlock = parseInt(localStorage.getItem(key) || "1");
    if (level === currentUnlock) {
       localStorage.setItem(key, currentUnlock + 1);
    }
  } else {
    unlockMsg = "<div style='color:#FF6B6B; font-weight:bold; margin-top:15px; font-size: 1.15rem; background: rgba(255,107,107,0.15); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,107,107,0.4);'>🔒 Score 100% to unlock the next level! Play again to progress!</div>";
  }

  // Save to DB
  if (email && state.qs.length > 0) {
    try {
      await fetch("/api/scores/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email,
          score: state.correct,
          total: state.qs.length,
          subject,
          grade
        })
      });
    } catch (err) {
      console.error(err);
    }
  }

  render(`
  <div class="result-screen">
    <span class="result-mascot">${mascot}</span>
    <div class="result-title">${title}</div>
    ${unlockMsg}
    <div class="score-circle" style="--score-deg:${deg}deg">
      <div class="score-inner">
        <div class="score-num">${pct}%</div>
        <div class="score-label">Accuracy</div>
      </div>
    </div>
    <div class="result-stats">
      <div class="r-stat"><div class="r-stat-val" style="color:#4ECDC4">${state.correct}</div><div class="r-stat-label">Correct</div></div>
      <div class="r-stat"><div class="r-stat-val" style="color:#FF6B6B">${state.qs.length-state.correct}</div><div class="r-stat-label">Wrong</div></div>
      <div class="r-stat"><div class="r-stat-val" style="color:#FFE66D">${state.xp}</div><div class="r-stat-label">Total XP</div></div>
    </div>
    <button class="play-again" onclick="goBack()">Back to Map 🗺️</button>
  </div>`);
}

function goBack() {
  window.location.href = `dashboard.html?email=${email || ''}`;
}

loadQuestions();
</script>
