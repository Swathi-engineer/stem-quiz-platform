<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f1a, #1a0033);
  color: white;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  background: #140024;
  padding: 15px 30px;
}

.navbar a {
  margin-right: 20px;
  color: white;
  text-decoration: none;
  cursor: pointer;
}

.navbar a:hover {
  color: #c084fc;
}

.container {
  padding: 30px;
}

.card {
  background: #1e1e2f;
  padding: 20px;
  border-radius: 10px;
  max-width: 700px;
  margin: auto;
  box-shadow: 0 0 10px purple;
}

.section {
  display: none;
}

.active {
  display: block;
}

.user-box, .score-box {
  background: #2c2c44;
  padding: 10px;
  margin-top: 10px;
  border-radius: 6px;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 5px 10px;
  margin-top: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div>🛠️ Admin Panel</div>
  <div>
    <a onclick="showSection('users')">Manage Users</a>
    <a onclick="showSection('performance')">View Performance</a>
    <a onclick="logout()">Logout</a>
  </div>
</div>

<div class="container">

<!-- USERS -->
<div id="users" class="section active card">
  <h3>➕ Add New User</h3>
  <input type="email" id="newEmail" placeholder="User Email" style="width: 100%; padding: 10px; margin-top: 5px; background: #2c2c44; color: white; border: none; border-radius: 5px;" />
  <input type="password" id="newPass" placeholder="Password" style="width: 100%; padding: 10px; margin-top: 10px; background: #2c2c44; color: white; border: none; border-radius: 5px;" />
  
  <select id="newRole" style="width: 100%; padding: 10px; margin-top: 10px; background: #2c2c44; color: white; border: none; border-radius: 5px; outline:none;">
    <option value="student">Student</option>
    <option value="teacher">Teacher</option>
    <option value="admin">Admin</option>
  </select>
  
  <button onclick="addUser()" style="width: 100%; background: #22c55e; color: white; padding: 10px; margin-top: 15px; border-radius: 5px; font-weight:bold; cursor: pointer; border: none;">Add User</button>

  <hr style="border-color: #a855f7; margin: 25px 0;">

  <h3>👥 Manage Existing Users</h3>
  <div id="userList"></div>
</div>

<!-- PERFORMANCE -->
<div id="performance" class="section card">
  <h3 style="color:#c084fc; border-bottom: 2px solid #c084fc; padding-bottom:10px;">🎓 Student Analytics</h3>
  <div id="scoreList" style="margin-bottom: 30px;"></div>

  <h3 style="color:#22c55e; border-bottom: 2px solid #22c55e; padding-bottom:10px;">👩‍🏫 Active Instructors</h3>
  <div id="teacherList"></div>
</div>

</div>

<script>

// SWITCH SECTION
function showSection(id) {
  document.querySelectorAll(".section").forEach(sec => {
    sec.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  if (id === "users") loadUsers();
  if (id === "performance") loadScores();
}

// ADD USER
async function addUser() {
  const email = document.getElementById("newEmail").value;
  const password = document.getElementById("newPass").value;
  const role = document.getElementById("newRole").value;

  if(!email || !password) return alert("Please fill both Email and Password fields! 🛑");

  await fetch("/api/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password, role })
  });

  alert("User successfully added! ✅");
  
  // Clear inputs and reload list
  document.getElementById("newEmail").value = "";
  document.getElementById("newPass").value = "";
  loadUsers();
}

// DELETE USER
async function deleteUser(id) {
  if(!confirm("Are you absolutely sure you want to delete this user? This cannot be undone.")) return;

  await fetch(`/api/auth/users/${id}`, { method: "DELETE" });
  loadUsers(); // Refresh the list instantly
}

// LOAD USERS
async function loadUsers() {
  const res = await fetch("/api/auth/users");
  const users = await res.json();

  const container = document.getElementById("userList");
  container.innerHTML = "";

  users.forEach(u => {
    container.innerHTML += `
      <div class="user-box" style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <b>${u.email}</b>
          <span style="background:#a855f7; padding:2px 8px; border-radius:10px; font-size:12px; margin-left:10px;">${u.role}</span>
        </div>
        <button onclick="deleteUser('${u._id}')" style="background:#ef4444; border-radius:5px; padding:5px 15px; margin:0; width:auto; font-weight:bold;">Remove</button>
      </div>
    `;
  });
}

// LOAD SCORES & ANALYTICS
async function loadScores() {
  const res = await fetch("/api/scores");
  const scores = await res.json();

  const usersRes = await fetch("/api/auth/users");
  const users = await usersRes.json();

  // STUDENT ANALYTICS (Aggregated)
  const container = document.getElementById("scoreList");
  container.innerHTML = "";
  
  const studentData = {};
  scores.forEach(s => {
    if(!studentData[s.email]) studentData[s.email] = { totalQuizzes: 0, totalScore: 0, totalMax: 0 };
    studentData[s.email].totalQuizzes += 1;
    studentData[s.email].totalScore += s.score;
    studentData[s.email].totalMax += s.total;
  });

  for(const [email, data] of Object.entries(studentData)) {
    const percent = Math.round((data.totalScore / data.totalMax) * 100) || 0;
    let badge = percent >= 90 ? "🏆 Master" : percent >= 70 ? "🥇 Gold" : percent >= 50 ? "🥈 Silver" : "🥉 Beginner";

    container.innerHTML += `
      <div class="score-box" style="display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #c084fc;">
        <div>
          <b style="color:#e9d5ff; font-size:1.1em;">${email}</b><br>
          <span style="color:#aaa;">Quizzes Finished: ${data.totalQuizzes}</span>
        </div>
        <div style="text-align:right;">
          <span style="font-size:1.3em; font-weight:bold; color:#4ade80;">${percent}%</span><br>
          <span style="font-size:0.9em; text-shadow:0 0 5px #fde047;">${badge}</span>
        </div>
      </div>
    `;
  }

  if(Object.keys(studentData).length === 0) container.innerHTML = "<p style='color:#aaa; font-style:italic;'>No student scores found yet.</p>";

  // TEACHER ANALYTICS
  // First fetch questions to count them!
  const qRes = await fetch("/api/questions");
  const allQs = await qRes.json();

  const teacherContainer = document.getElementById("teacherList");
  teacherContainer.innerHTML = "";
  
  const teachers = users.filter(u => u.role === "teacher");
  teachers.forEach(t => {
     // Count everything!
     const qsContributed = allQs.filter(q => q.addedBy === t.email).length;
     
     teacherContainer.innerHTML += `
      <div class="score-box" style="display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #22c55e; margin-top:15px;">
        <div>
          <b style="color:#bbf7d0; font-size:1.1em;">${t.email}</b><br>
          <span style="color:#aaa;">Questions Contributed: <b style="color:white; font-size:1.2em; margin-left: 5px;">${qsContributed}</b></span>
        </div>
        <div style="text-align:right;">
          <span style="font-size:1em; font-weight:bold; color:#22c55e;">Active 🟢</span>
        </div>
      </div>
    `;
  });

  if(teachers.length === 0) teacherContainer.innerHTML = "<p style='color:#aaa; font-style:italic;'>No teachers currently registered.</p>";
}

// LOGOUT
function logout() {
  window.location.href = "login.html";
}

// LOAD DEFAULT
loadUsers();

</script>

</body>
</html>
