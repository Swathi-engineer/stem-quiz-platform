<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  background: linear-gradient(45deg, #0f0f1a, #1a0033, #0b0726, #210d33);
  background-size: 400% 400%;
  animation: bgPulse 15s ease infinite; 
  color: white;
}
@keyframes bgPulse {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(20, 0, 36, 0.85);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 15px 30px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  position: sticky;
  top: 0;
  z-index: 100;
}
.navbar .brand { font-size: 1.5em; font-weight: bold; color: #a855f7; letter-spacing: 1px; }
.navbar-nav { display: flex; gap: 20px; }
.navbar-nav a {
  color: #a0a0b0; text-decoration: none; cursor: pointer; font-weight: bold;
  text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
}
.navbar-nav a:hover, .navbar-nav a.active-link { color: white; }

.container { padding: 40px; max-width: 900px; margin: 0 auto; }
.card {
  background: rgba(20, 20, 32, 0.65);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  padding: 40px; border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  animation: fadeIn 0.5s ease-in-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.section { display: none; }
.active { display: block; }
h3 { margin-top: 0; margin-bottom: 25px; font-size: 1.8em; color: #fff; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.full-width { grid-column: span 2; }

input, select {
  width: 100%; padding: 15px; border-radius: 12px;
  border: 2px solid #3d3d5c; outline: none;
  background: #2c2c44; color: white;
  font-size: 16px; font-family: inherit; transition: 0.3s;
}
input::placeholder { color: #a0a0b0; }
input:focus, select:focus { border-color: #a855f7; box-shadow: 0 0 10px rgba(168, 85, 247, 0.3); background: #3d3d5c; }

button {
  width: 100%; padding: 15px; border: none; border-radius: 12px;
  font-family: 'Outfit', sans-serif; color: white;
  font-size: 18px; font-weight: bold; cursor: pointer;
  transition: transform 0.1s, border-bottom 0.1s;
}
button:hover { filter: brightness(1.1); }
button:active { transform: translateY(4px); border-bottom: 0px solid transparent; }

.btn-green { background: #22c55e; border-bottom: 4px solid #16a34a; margin-top: 15px;}
.btn-green:active { border-bottom-color: transparent; }

.btn-red { background: #ef4444; border-bottom: 4px solid #dc2626; padding: 10px; font-size: 14px; margin-top: 0; }
.btn-red:active { border-bottom-color: transparent; }

.user-box, .score-box {
  background: rgba(44, 44, 68, 0.8);
  padding: 20px; margin-top: 15px; border-radius: 12px;
  border-left: 5px solid #a855f7;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  display: flex; justify-content: space-between; align-items: center;
}

/* FLOATING ICONS */
.f-icon {
  position: fixed; font-size: 50px; opacity: 0.08;
  animation: float 6s ease-in-out infinite;
  z-index: -1; pointer-events: none;
}
.i1 { top: 15%; right: 10%; animation-delay: 0s; }
.i2 { bottom: 15%; right: 20%; animation-delay: 1s; }
.i3 { top: 40%; left: 5%; animation-delay: 2s; }
@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(5deg); }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="brand">🛠️ Admin Panel</div>
  <div class="navbar-nav">
    <a onclick="showSection('users')" class="nav-link active-link" id="nav-users">Manage Users</a>
    <a onclick="showSection('performance')" class="nav-link" id="nav-perf">Platform Analytics</a>
    <a onclick="logout()">Logout</a>
  </div>
</div>

<div class="f-icon i1">👑</div>
<div class="f-icon i2">📈</div>
<div class="f-icon i3">⚙️</div>

<div class="container">

<!-- USERS SECTION -->
<div id="users" class="section active card">
  <h3>➕ Add New User</h3>
  
  <div class="form-grid">
    <input type="email" id="newEmail" placeholder="User Email" />
    <input type="password" id="newPass" placeholder="Password" />
    <div class="full-width">
      <select id="newRole">
        <option value="teacher">Teacher Account</option>
        <option value="admin">Admin Account</option>
      </select>
    </div>
  </div>
  
  <button onclick="addUser()" class="btn-green">Create User</button>

  <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 35px 0;">

  <h3>👥 Manage Existing Users</h3>
  <div id="userList"></div>
</div>

<!-- PERFORMANCE / ANALYTICS SECTION -->
<div id="performance" class="section card">
  <h3 style="color:#c084fc; border-bottom: 2px solid #c084fc; padding-bottom:10px;">🏫 School-Wide Analytics</h3>
  <div id="scoreList" style="margin-bottom: 40px;"></div>

  <h3 style="color:#22c55e; border-bottom: 2px solid #22c55e; padding-bottom:10px;">👩‍🏫 Active Teachers</h3>
  <div id="teacherList"></div>
</div>

</div>

<script>

// SWITCH SECTION
function showSection(id) {
  document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
  document.querySelectorAll(".nav-link").forEach(link => link.classList.remove("active-link"));

  document.getElementById(id).classList.add("active");
  if(document.getElementById("nav-" + (id==="users"?"users":"perf"))) {
     document.getElementById("nav-" + (id==="users"?"users":"perf")).classList.add("active-link");
  }

  if (id === "users") loadUsers();
  if (id === "performance") loadScores();
}

// ADD USER
async function addUser() {
  const email = document.getElementById("newEmail").value;
  const password = document.getElementById("newPass").value;
  const role = document.getElementById("newRole").value;

  if(!email || !password) return alert("Please fill both Email and Password fields! 🛑");

  await fetch("/api/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password, role })
  });

  alert("User successfully added! ✅");
  
  // Clear inputs and reload list
  document.getElementById("newEmail").value = "";
  document.getElementById("newPass").value = "";
  loadUsers();
}

// DELETE USER
async function deleteUser(id) {
  if(!confirm("Are you absolutely sure you want to delete this user? This cannot be undone.")) return;

  await fetch(`/api/auth/users/${id}`, { method: "DELETE" });
  loadUsers(); // Refresh the list instantly
}

// LOAD USERS
async function loadUsers() {
  const res = await fetch("/api/auth/users");
  const users = await res.json();

  const container = document.getElementById("userList");
  container.innerHTML = "";

  users.forEach(u => {
    container.innerHTML += `
      <div class="user-box">
        <div>
          <b style="font-size:1.1em;">${u.email}</b>
          <span style="background:rgba(168,85,247,0.3); color:#e9d5ff; padding:4px 10px; border-radius:12px; font-size:0.85em; font-weight:bold; text-transform:uppercase; margin-left:10px; border:1px solid #a855f7;">${u.role}</span>
        </div>
        <div style="width:120px;">
          <button onclick="deleteUser('${u._id}')" class="btn-red">Remove</button>
        </div>
      </div>
    `;
  });
}

// LOAD SCORES & ANALYTICS
async function loadScores() {
  const res = await fetch("/api/scores");
  const scores = await res.json();

  const usersRes = await fetch("/api/auth/users");
  const users = await usersRes.json();

  // BIRD'S EYE SCHOOL ANALYTICS (Aggregated by Grade)
  const container = document.getElementById("scoreList");
  container.innerHTML = "";
  
  const gradeData = {};
  scores.forEach(s => {
    if(!gradeData[s.grade]) gradeData[s.grade] = { totalQuizzes: 0, totalScore: 0, totalMax: 0 };
    gradeData[s.grade].totalQuizzes += 1;
    gradeData[s.grade].totalScore += s.score;
    gradeData[s.grade].totalMax += s.total;
  });

  for(const [grade, data] of Object.entries(gradeData)) {
    const percent = Math.round((data.totalScore / data.totalMax) * 100) || 0;
    let rank = percent >= 90 ? "Excellent" : percent >= 70 ? "Good" : percent >= 50 ? "Needs Improvement" : "Critical Warning";

    container.innerHTML += `
      <div class="score-box" style="display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #c084fc;">
        <div>
          <b style="color:#e9d5ff; font-size:1.1em;">🏫 Grade ${grade}</b><br>
          <span style="color:#aaa;">Total Assessments: ${data.totalQuizzes}</span>
        </div>
        <div style="text-align:right;">
          <span style="font-size:1.3em; font-weight:bold; color:#4ade80;">${percent}% Average</span><br>
          <span style="font-size:0.9em; text-shadow:0 0 5px #fde047;">${rank}</span>
        </div>
      </div>
    `;
  }

  if(Object.keys(gradeData).length === 0) container.innerHTML = "<p style='color:#aaa; font-style:italic;'>No school data found yet.</p>";

  // TEACHER ANALYTICS
  // First fetch questions to count them!
  const qRes = await fetch("/api/questions");
  const allQs = await qRes.json();

  const teacherContainer = document.getElementById("teacherList");
  teacherContainer.innerHTML = "";
  
  const teachers = users.filter(u => u.role === "teacher");
  teachers.forEach(t => {
     // Count everything!
     const qsContributed = allQs.filter(q => q.addedBy === t.email).length;
     
     teacherContainer.innerHTML += `
      <div class="score-box" style="display:flex; justify-content:space-between; align-items:center; border-left: 4px solid #22c55e; margin-top:15px;">
        <div>
          <b style="color:#bbf7d0; font-size:1.1em;">${t.email}</b><br>
          <span style="color:#aaa;">Questions Contributed: <b style="color:white; font-size:1.2em; margin-left: 5px;">${qsContributed}</b></span>
        </div>
        <div style="text-align:right;">
          <span style="font-size:1em; font-weight:bold; color:#22c55e;">Active 🟢</span>
        </div>
      </div>
    `;
  });

  if(teachers.length === 0) teacherContainer.innerHTML = "<p style='color:#aaa; font-style:italic;'>No teachers currently registered.</p>";
}

// LOGOUT
function logout() {
  window.location.href = "login.html";
}

// LOAD DEFAULT
loadUsers();

</script>

</body>
</html>
