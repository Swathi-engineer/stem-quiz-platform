<!DOCTYPE html>
<html>
<head>
  <title>Login | STEMingo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(45deg, #0f0f1a, #1a0033, #0b0726, #210d33);
      background-size: 400% 400%;
      animation: bgPulse 15s ease infinite; 
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    @keyframes bgPulse {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* NEW SPLIT LAYOUT */
    .page-wrapper {
      display: flex;
      max-width: 1100px;
      width: 100%;
      background: rgba(20, 20, 32, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      overflow: hidden;
      animation: fadeIn 1s ease-in-out;
    }

    .info-panel {
      flex: 1.2;
      padding: 60px;
      background: linear-gradient(135deg, rgba(88, 204, 2, 0.1), rgba(28, 176, 246, 0.1));
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .login-panel {
      flex: 1;
      padding: 50px;
      background: rgba(15, 15, 26, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
    }

    .container {
      width: 100%;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mascot-container {
      animation: levitate 3s ease-in-out infinite;
      margin-bottom: 20px;
    }

    @keyframes levitate {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .mascot {
      font-size: 80px;
      filter: drop-shadow(0px 8px 8px rgba(0,0,0,0.5));
    }

    h2 {
      margin-bottom: 25px;
      color: #fff;
      font-size: 2em;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: 2px solid #3d3d5c;
      outline: none;
      background: #2c2c44;
      color: white;
      font-size: 16px;
      transition: 0.3s;
    }

    input::placeholder {
      color: #a0a0b0;
    }

    input:focus {
      border-color: #58cc02;
      box-shadow: 0 0 10px rgba(88, 204, 2, 0.5);
      background: #3d3d5c;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: #58cc02;
      border-bottom: 4px solid #58a700;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s, border-bottom 0.1s;
    }

    button:hover {
      filter: brightness(1.1);
    }

    button:active {
      transform: translateY(4px);
      border-bottom: 0px solid #58a700;
    }

    /* SOCIAL BUTTONS & EXTRAS */
    .social-btn {
      background: #3d3d5c;
      border-bottom: 4px solid #2c2c44;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .social-btn:active {
      border-bottom: 0px solid transparent;
    }

    .divider {
      margin: 25px 0;
      color: #a0a0b0;
      font-size: 0.9em;
      display: flex;
      align-items: center;
      font-weight: bold;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #3d3d5c;
      margin: 0 15px;
    }

    .footer-links {
      margin-top: 20px;
      color: #a0a0b0;
      font-size: 0.9em;
    }
    .footer-links a {
      color: #1cb0f6;
      text-decoration: none;
      font-weight: bold;
    }

    /* INFO PANEL STYLES */
    .info-title {
      font-size: 3em;
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 15px;
      color: white;
    }
    .info-desc {
      font-size: 1.1em;
      color: #a0a0b0;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .feature-item {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255,255,255,0.05);
      padding: 15px 20px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .feature-item span { font-size: 1.8em; }

    /* FLOATING ICONS */
    .f-icon {
      position: absolute;
      font-size: 50px;
      opacity: 0.2;
      animation: float 6s ease-in-out infinite;
    }
    .i1 { top: 10%; right: 10%; animation-delay: 0s; }
    .i2 { bottom: 10%; right: 20%; animation-delay: 1s; }
    .i3 { top: 40%; left: -10%; animation-delay: 2s; }

    /* Mobile Responsive */
    @media (max-width: 800px) {
      .page-wrapper { flex-direction: column; }
      .info-panel { display: none; }
      .login-panel { width: 100%; padding: 40px 20px; }
    }

    #msg {
      margin-top: 15px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="page-wrapper">
  
  <!-- LEFT: INFO PANEL -->
  <div class="info-panel">
    <div class="f-icon i1">🧬</div>
    <div class="f-icon i2">🔭</div>
    <div class="f-icon i3">📐</div>

    <h1 class="info-title">Master STEM <br><span style="color:#58cc02;">The Fun Way!</span> 🚀</h1>
    <p class="info-desc">Join thousands of students earning gems, tracking streaks, and leveling up their brains in a completely gamified environment.</p>
    
    <div class="feature-list">
      <div class="feature-item"><span>🎮</span> Gamified Quizzes & Challenges</div>
      <div class="feature-item"><span>💎</span> Unlock Epic Rewards & Badges</div>
      <div class="feature-item"><span>🔥</span> Track Your Daily Streaks</div>
    </div>
  </div>

  <!-- RIGHT: LOGIN PANEL -->
  <div class="login-panel">
    <div class="container">
      <div class="mascot-container">
        <div class="mascot">🦉</div>
      </div>
      <h2>Welcome Back!</h2>

      <div class="input-group">
        <input type="email" id="email" placeholder="Enter your email address">
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button onclick="login()">Log In</button>
      
      <p id="msg"></p>

      
    </div>
  </div>
  
</div>

<script>
  async function login() {
  console.log("Login clicked 🔥");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  console.log("Sending:", email, password);

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    console.log("Response:", res);

    const data = await res.json();
    console.log("Data:", data);

    if (res.ok) {
    

      if (data.role === "student") {
        window.location.href = "dashboard.html?email=" + email;
      } else if (data.role === "teacher") {
        window.location.href = "teacher.html?email=" + email;
      } else if (data.role === "admin") {
        window.location.href = "admin.html?email=" + email;
      }

    } else {
      alert("Login failed ❌");
    }

  } catch (err) {
    console.error("ERROR:", err);
    alert("Server not reachable ❌");
  }
}
</script>

</body>
</html>
