<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #1a1a2e, #0f0c29);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 350px;
      background: rgba(30, 27, 58, 0.9);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
      backdrop-filter: blur(10px);
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      margin-bottom: 20px;
      color: #c084fc;
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #2a2755;
      color: white;
      transition: 0.3s;
    }

    input::placeholder {
      color: #aaa;
    }

    input:focus {
      box-shadow: 0 0 10px #a855f7;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #a855f7, #6d28d9);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #a855f7;
    }

    #msg {
      margin-top: 15px;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="container">
  <div class="icon">🔐</div>
  <h2></h2>Login

  <div class="input-group">
    <input type="email" id="email" placeholder="Enter Email">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Enter Password">
  </div>

  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
  async function login() {
  console.log("Login clicked 🔥");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  console.log("Sending:", email, password);

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    console.log("Response:", res);

    const data = await res.json();
    console.log("Data:", data);

    if (res.ok) {
    

      if (data.role === "student") {
        window.location.href = "dashboard.html?email=" + email;
      } else if (data.role === "teacher") {
        window.location.href = "teacher.html?email=" + email;
      } else if (data.role === "admin") {
        window.location.href = "admin.html?email=" + email;
      }

    } else {
      alert("Login failed ❌");
    }

  } catch (err) {
    console.error("ERROR:", err);
    alert("Server not reachable ❌");
  }
}
</script>

</body>
</html>
