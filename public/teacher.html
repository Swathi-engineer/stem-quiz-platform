<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  background: linear-gradient(45deg, #0f0f1a, #1a0033, #0b0726, #210d33);
  background-size: 400% 400%;
  animation: bgPulse 15s ease infinite;
  color: white;
}

@keyframes bgPulse {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(20, 0, 36, 0.85);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  padding: 15px 30px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  position: sticky;
  top: 0;
  z-index: 100;
}

.navbar .brand {
  font-size: 1.5em; 
  font-weight: bold; 
  color: #c084fc; 
  letter-spacing: 1px;
}

.navbar-nav {
  display: flex;
  gap: 20px;
}
.navbar-nav a {
  color: #a0a0b0;
  text-decoration: none;
  cursor: pointer;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: 0.3s;
}

.navbar-nav a:hover, .navbar-nav a.active-link {
  color: white;
}

.container {
  padding: 40px;
  max-width: 900px;
  margin: 0 auto;
}

.card {
  background: rgba(20, 20, 32, 0.65);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 40px;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.section { display: none; }
.active { display: block; }

h3 {
  margin-top: 0;
  margin-bottom: 25px;
  font-size: 1.8em;
  color: #fff;
}

/* FORM STYLES */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.full-width { grid-column: span 2; }

input, select {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: 2px solid #3d3d5c;
  outline: none;
  background: #2c2c44;
  color: white;
  font-size: 16px;
  font-family: inherit;
  transition: 0.3s;
}

input::placeholder { color: #a0a0b0; }
input:focus, select:focus {
  border-color: #c084fc;
  box-shadow: 0 0 10px rgba(192, 132, 252, 0.3);
  background: #3d3d5c;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 25px;
  border: none;
  border-radius: 12px;
  background: #c084fc;
  border-bottom: 4px solid #9333ea;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.1s, border-bottom 0.1s;
}

button:hover { filter: brightness(1.1); }
button:active { transform: translateY(4px); border-bottom: 0px solid #9333ea; }

.question-box {
  background: rgba(44, 44, 68, 0.8);
  padding: 20px;
  margin-top: 15px;
  border-radius: 12px;
  border-left: 5px solid #c084fc;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.question-box b { font-size: 1.2em; display: block; margin-bottom: 10px; color: white;}
.q-meta { color: #a0a0b0; font-size: 0.9em; font-weight: bold; }

/* FLOATING ICONS */
.f-icon {
  position: fixed;
  font-size: 50px;
  opacity: 0.08;
  animation: float 6s ease-in-out infinite;
  z-index: -1;
  pointer-events: none;
}
.i1 { top: 15%; right: 10%; animation-delay: 0s; }
.i2 { bottom: 15%; right: 20%; animation-delay: 1s; }
.i3 { top: 40%; left: 5%; animation-delay: 2s; }
.i4 { bottom: 20%; left: 15%; animation-delay: 3s; font-size: 80px; }

/* TEACHER STATS ROW */
.stats-row {
  display: flex;
  gap: 20px;
  margin-bottom: 25px;
}
.stat-card {
  flex: 1;
  background: rgba(20, 20, 32, 0.8);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
  transition: transform 0.3s;
}
.stat-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
.stat-val { font-size: 2.2em; font-weight: 900; margin-bottom: 5px; }
.stat-title { font-size: 0.9em; color: #a0a0b0; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

.c-blue { color: #1cb0f6; }
.c-green { color: #58cc02; }
.c-purple { color: #c084fc; text-shadow: 0 0 10px rgba(192,132,252,0.3); }

/* FLOATING ANIMATION */
@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(5deg); }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="brand">👩‍🏫 Teacher Panel</div>
  <div class="navbar-nav">
    <a onclick="showSection('add')" class="nav-link active-link" id="nav-add">Add Question</a>
    <a onclick="showSection('view')" class="nav-link" id="nav-view">View Questions</a>
    <a onclick="showSection('performance')" class="nav-link" id="nav-perf">Student Progress</a>
    <a onclick="logout()">Logout</a>
  </div>
</div>

<div class="f-icon i1">🧬</div>
<div class="f-icon i2">🔭</div>
<div class="f-icon i3">📐</div>
<div class="f-icon i4">💻</div>

<div class="container">

<!-- DASHBOARD STATS ROW (Always Visible) -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-val c-purple" id="stat-q">0</div>
    <div class="stat-title">Total Questions</div>
  </div>
  <div class="stat-card">
    <div class="stat-val c-blue" id="stat-s">0</div>
    <div class="stat-title">Student Results</div>
  </div>
  <div class="stat-card">
    <div class="stat-val c-green" id="stat-a">0%</div>
    <div class="stat-title">Glob. Avg Score</div>
  </div>
</div>

<!-- ADD QUESTION -->
<div id="add" class="section active card">
  <h3>➕ Add New Question</h3>

  <div class="form-grid">
    <select id="grade">
      <option value="">Select Grade</option>
      <option>1</option><option>2</option><option>3</option>
      <option>4</option><option>5</option><option>6</option>
      <option>7</option><option>8</option><option>9</option>
      <option>10</option><option>11</option><option>12</option>
    </select>

    <select id="subject">
      <option value="">Select Subject</option>
      <option>Science</option>
      <option>Technology</option>
      <option>Engineering</option>
      <option>Mathematics</option>
    </select>

    <div class="full-width">
      <input type="text" id="question" placeholder="Enter Question Statement...">
    </div>

    <input type="text" id="opt1" placeholder="Option A">
    <input type="text" id="opt2" placeholder="Option B">
    <input type="text" id="opt3" placeholder="Option C">
    <input type="text" id="opt4" placeholder="Option D">

    <div class="full-width">
      <input type="text" id="answer" placeholder="Exact Correct Answer (Must match one option)">
    </div>
  </div>

  <button onclick="addQuestion()">Submit Question</button>
</div>

<!-- VIEW QUESTIONS -->
<div id="view" class="section card">
  <h3>📋 Question Bank</h3>
  <div id="questionsList"></div>
</div>

<!-- PERFORMANCE -->
<div id="performance" class="section card">
  <h3>📊 Student Results & Progress</h3>
  
  <select id="filterGrade" onchange="loadPerformance()" style="margin-bottom: 20px;">
    <option value="All">View All Grades</option>
    <option value="1">Grade 1</option><option value="2">Grade 2</option><option value="3">Grade 3</option>
    <option value="4">Grade 4</option><option value="5">Grade 5</option><option value="6">Grade 6</option>
    <option value="7">Grade 7</option><option value="8">Grade 8</option><option value="9">Grade 9</option>
    <option value="10">Grade 10</option><option value="11">Grade 11</option><option value="12">Grade 12</option>
  </select>

  <div id="performanceList"></div>
</div>

</div>

<script>

// SWITCH SECTION
function showSection(id) {
  document.querySelectorAll(".section").forEach(sec => {
    sec.classList.remove("active");
  });
  
  document.querySelectorAll(".nav-link").forEach(link => {
    link.classList.remove("active-link");
  });

  document.getElementById(id).classList.add("active");
  if(document.getElementById("nav-" + id)) {
     document.getElementById("nav-" + id).classList.add("active-link");
  }

  if (id === "view") {
    loadQuestions();
  }

  if (id === "performance") {
    loadPerformance();
  }
}

// Get Email
const params = new URLSearchParams(window.location.search);
const email = params.get("email");

// LOAD GLOBAL STATS
async function loadTeacherDashboard() {
  try {
    const [qRes, sRes] = await Promise.all([ fetch("/api/questions"), fetch("/api/scores") ]);
    const qData = await qRes.json();
    const sData = await sRes.json();
    
    document.getElementById("stat-q").innerText = qData.length;
    document.getElementById("stat-s").innerText = sData.length;
    
    let totalS = 0; let totalM = 0;
    sData.forEach(s => { totalS += s.score; totalM += s.total; });
    document.getElementById("stat-a").innerText = totalM ? Math.round((totalS/totalM)*100) + "%" : "0%";
  } catch(e) { console.error("Stats Error:", e); }
}
loadTeacherDashboard();

// ADD QUESTION
async function addQuestion() {

  const question = document.getElementById("question").value;
  const grade = document.getElementById("grade").value;
  const subject = document.getElementById("subject").value;

  const options = [
    document.getElementById("opt1").value,
    document.getElementById("opt2").value,
    document.getElementById("opt3").value,
    document.getElementById("opt4").value
  ];

  const answer = document.getElementById("answer").value;

  await fetch("/api/questions/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      question,
      options,
      answer,
      subject,
      grade,
      addedBy: email
    })
  });

  alert("Question Added ✅");
}

// LOAD QUESTIONS
async function loadQuestions() {
  const res = await fetch("/api/questions");
  let data = await res.json();

  const container = document.getElementById("questionsList");
  container.innerHTML = "";

  // Reverse so the newest questions show up first!
  data.reverse().forEach(q => {
    container.innerHTML += `
      <div class="question-box">
        <b>Q: ${q.question}</b>
        <div class="q-meta">📚 ${q.subject} | 🎯 Grade ${q.grade}</div>
      </div>
    `;
  });
  
  loadTeacherDashboard(); // Refresh top stats safely when loading view
}

async function loadPerformance() {
  const res = await fetch("/api/scores");
  const data = await res.json();

  const container = document.getElementById("performanceList");
  container.innerHTML = "";
  
  if (data.length === 0) {
    container.innerHTML = "<p>No student results yet.</p>";
    return;
  }

  const selectedGrade = document.getElementById("filterGrade") ? document.getElementById("filterGrade").value : "All";
  
  let filteredData = data;
  if (selectedGrade !== "All") {
    filteredData = data.filter(s => String(s.grade) === selectedGrade);
  }

  if (filteredData.length === 0) {
    container.innerHTML = `<p style="color:#a0a0b0;">No student results found for this grade.</p>`;
    return;
  }

  // Group by Grade
  const gradesMap = {};
  filteredData.forEach(s => {
    if (!gradesMap[s.grade]) gradesMap[s.grade] = [];
    gradesMap[s.grade].push(s);
  });

  // Render grouped results
  Object.keys(gradesMap).sort((a,b) => a - b).forEach(grade => {
    container.innerHTML += `<h4 style="color:#c084fc; margin-top:25px; border-bottom:1px solid #3d3d5c; padding-bottom:10px;">🎯 Grade ${grade} Students</h4>`;
    
    gradesMap[grade].forEach(s => {
      const percent = Math.round((s.score / s.total) * 100);
      container.innerHTML += `
        <div class="question-box" style="border-left-color: ${percent >= 70 ? '#58cc02' : '#ff9600'}; margin-bottom: 5px;">
          <b>🧑‍🎓 ${s.email}</b>
          <div class="q-meta">📚 ${s.subject} | 🏆 Score: ${s.score}/${s.total} (${percent}%)</div>
        </div>
      `;
    });
  });
}

// LOGOUT
function logout() {
  window.location.href = "login.html";
}

</script>

</body>
</html>
